apiVersion: v1
kind: Service
metadata:
  name: matching-service
  namespace: carpooling
  labels:
    app: matching-service
  annotations:
    alb.ingress.kubernetes.io/healthcheck-path: /matches/health
    alb.ingress.kubernetes.io/healthcheck-port: '8081'
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8081
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: matching-service

