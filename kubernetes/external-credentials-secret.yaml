apiVersion: v1
kind: Secret
metadata:
  name: external-aws-credentials
  namespace: carpooling
type: Opaque
stringData:
  # SNS credentials (these should be rotated - they were exposed)
  # Using the same credentials for both topics for simplicity
  sns-access-key: ""
  sns-secret-key: ""

  # SQS credentials - separate for each queue
  sqs-trip-available-access-key: ""
  sqs-trip-available-secret-key: ""
  sqs-update-offer-access-key: ""
  sqs-update-offer-secret-key: ""

