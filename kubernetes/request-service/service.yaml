apiVersion: v1
kind: Service
metadata:
  name: request-service
  namespace: carpooling
  labels:
    app: request-service
  annotations:
    alb.ingress.kubernetes.io/healthcheck-path: /requests/health
    alb.ingress.kubernetes.io/healthcheck-port: '8080'
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 9091
    targetPort: 9091
    protocol: TCP
    name: metrics
  selector:
    app: request-service

